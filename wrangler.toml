name = "mailfree-wf"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "a2c8037a-c6c8-45db-8c0e-fa2f11516135" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="coral"
ADMIN_PASSWORD="123456gg"
GUEST_PASSWORD="123456gg"
JWT_TOKEN="tYAH4QHWdC54oTxohLsMhj1zJrkyzPoy37PHZjOzDD3"
JWT_TOKENGUEST_PASSWORD="tYAH4QHWdC54oTxohLsMhj1zJrkyzPoy37PHZjOzDD3"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="skys.mmv.kr"
RESEND_API_KEY=" "



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


